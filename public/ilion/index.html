<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILION — Neuronomicon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400;700&family=Roboto:wght@400;500;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── RESET ─────────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --red: #ff0000;
        --steel: #7184a0;
        --white: #ffffff;
        --bg: #000000;
        --mono: "Kode Mono", "Courier New", monospace;
      }

      body {
        background: #000;
        overflow: hidden;
        height: 100vh;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      /* ── CANVAS ─────────────────────────────────────────────────────── */
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1;
        display: block;
      }

      /* ── BANNER ─────────────────────────────────────────────────────── */
      #banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 46px;
        z-index: 20;
        background: var(--white);
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      #banner-star {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 46px;
        height: 46px;
        flex-shrink: 0;
        background: var(--bg);
        color: var(--white);
        font-size: 18px;
        transition: background 0.2s;
      }

      #banner-star:hover {
        background: #1a1a1a;
      }

      #banner-title {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 18px;
        color: var(--bg);
        padding-left: 18px;
        letter-spacing: 2px;
        user-select: none;
      }

      /* Diagonal red stripes — top-right corner of banner */
      #banner-stripes {
        position: absolute;
        right: 0;
        top: 0;
        width: 220px;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
      }

      #banner-stripes::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--bg);
        clip-path: polygon(40% 0, 100% 0, 100% 100%, 0% 100%);
      }

      #banner-stripes::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          -45deg,
          var(--red) 0px,
          var(--red) 14px,
          transparent 14px,
          transparent 32px
        );
        clip-path: polygon(40% 0, 100% 0, 100% 100%, 0% 100%);
      }

      /* ── VIGNETTE & CRT ─────────────────────────────────────────────── */
      #vignette {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(0, 0, 0, 0.65) 100%
        );
        pointer-events: none;
        z-index: 15;
      }

      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
        pointer-events: none;
        z-index: 200;
      }

      /* ── MAIN UI OVERLAY ─────────────────────────────────────────────── */
      #ui {
        position: fixed;
        top: 46px;
        left: 0;
        right: 0;
        bottom: 46px;
        z-index: 10;
        pointer-events: none;
        font-family: var(--mono);
      }

      /* ── STATS PANEL — top left ──────────────────────────────────────── */
      #stats {
        position: absolute;
        top: 24px;
        left: 30px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .stat-section {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .stat-label {
        font-size: 9px;
        letter-spacing: 4px;
        color: var(--steel);
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      .stat-row {
        font-size: 9px;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.75);
        text-transform: uppercase;
        line-height: 1.7;
      }

      #units-toggle {
        margin-top: 8px;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        pointer-events: auto;
        font-family: var(--mono);
        font-size: 8px;
        letter-spacing: 2px;
        color: var(--steel);
        text-transform: uppercase;
        text-align: left;
        opacity: 0.65;
        transition:
          opacity 0.2s,
          color 0.2s;
      }

      #units-toggle:hover {
        opacity: 1;
        color: var(--white);
      }

      /* ── CITY INPUT ───────────────────────────────────────────────────── */
      #city-form {
        margin-top: 4px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #city-input-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      #gh-user {
        background: none;
        border: none;
        border-bottom: 1px solid var(--steel);
        color: var(--white);
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 2px;
        width: 130px;
        padding: 2px 0;
        outline: none;
        opacity: 0.75;
        transition:
          opacity 0.2s,
          border-color 0.2s;
      }

      #gh-user:focus {
        opacity: 1;
        border-color: var(--white);
      }

      #gh-user::placeholder {
        color: var(--steel);
        opacity: 0.5;
      }

      #gh-submit {
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--mono);
        font-size: 8px;
        letter-spacing: 2px;
        color: var(--steel);
        text-transform: uppercase;
        padding: 0;
        transition: color 0.2s;
      }

      #gh-submit:hover {
        color: var(--white);
      }

      #city-status {
        font-size: 8px;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.35);
        text-transform: uppercase;
      }

      /* ── CONTROLS — top right ────────────────────────────────────────── */
      #controls {
        position: absolute;
        top: 24px;
        right: 30px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        text-align: right;
      }

      /* ── ERA HUD ─────────────────────────────────────────────────────── */
      #era-hud {
        position: absolute;
        bottom: 38px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--mono);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        opacity: 0;
        pointer-events: none;
        white-space: nowrap;
        transition: opacity 0.4s, color 0.6s;
      }

      /* ── ERA TOOLTIP OVERRIDES ────────────────────────────────────────── */
      #tooltip-era-mining { background: #7184a0; }
      #tooltip-era-rush   { background: #ff8800; }
      #tooltip-era-magi   { background: #44ddff; color: #000; }
      #tooltip-era-magi::after { border-top-color: #44ddff; }
      #tooltip-era-rush::after { border-top-color: #ff8800; }
      #tooltip-era-mining::after { border-top-color: #7184a0; }

      /* ── HINT ────────────────────────────────────────────────────────── */
      #hint {
        position: absolute;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        letter-spacing: 3px;
        color: rgba(255, 255, 255, 0.2);
        white-space: nowrap;
      }

      /* ── TOOLTIPS ────────────────────────────────────────────────────── */
      .tooltip {
        position: absolute;
        background: var(--red);
        color: var(--white);
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 6px 12px;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s;
      }

      /* Downward-pointing arrow */
      .tooltip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 9px solid var(--red);
      }

      /* ── FOOTER ──────────────────────────────────────────────────────── */
      #site-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 46px;
        z-index: 20;
        background: var(--white);
        display: flex;
        align-items: center;
      }

      #footer-name {
        font-family: var(--mono);
        font-weight: 700;
        font-size: clamp(14px, 1.8vw, 22px);
        color: var(--steel);
        padding-left: 44px;
        transition: opacity 0.2s;
      }

      #footer-name:hover {
        opacity: 0.75;
      }

      #footer-stripes {
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        display: flex;
      }

      .fs {
        display: block;
        width: 10px;
        height: 100%;
      }

      .fs.black {
        background: var(--bg);
      }

      .fs.blue {
        background: var(--steel);
      }
    </style>
  </head>

  <body>
    <!-- ── BANNER ── -->
    <header id="banner">
      <a
        href="https://neuronomicon.world"
        id="banner-star"
        aria-label="Back to Neuronomicon"
        >✦</a
      >
      <span id="banner-title">::: &nbsp;ILION</span>
      <div id="banner-stripes" aria-hidden="true"></div>
    </header>

    <!-- ── VIGNETTE ── -->
    <div id="vignette"></div>

    <!-- ── MAIN UI ── -->
    <div id="ui">
      <!-- Stats panel — top left -->
      <div id="stats">
        <div class="stat-section">
          <div class="stat-label">LOCATION</div>
          <div class="stat-row">&gt; CENTAURI SECTOR</div>
          <div class="stat-row">&gt; TROY SYSTEM</div>
        </div>
        <div class="stat-section">
          <div class="stat-label">DIMENSIONS</div>
          <div class="stat-row" id="dim-long">
            &gt; 523,200,000 KILOMETERS LONG
          </div>
          <div class="stat-row" id="dim-width">
            &gt; 21,000,000 KILOMETERS WIDTH
          </div>
          <div class="stat-row" id="dim-depth">
            &gt; 21,000,000 KILOMETERS DEPTH
          </div>
          <button id="units-toggle">UNITS: KM</button>
        </div>
        <div class="stat-section" id="city-form">
          <div class="stat-label">POPULATION</div>
          <div id="city-input-row">
            <input
              id="gh-user"
              type="text"
              placeholder="github username"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="gh-submit">LOAD</button>
          </div>
          <div id="city-status">&gt; LOADING …</div>
        </div>
      </div>

      <!-- Controls — top right -->
      <div id="controls">
        <div class="stat-label">CONTROLS</div>
        <div class="stat-row" id="view-name">&gt; VIEW: ORBITAL</div>
        <div class="stat-row">&gt; SPACE: CHANGE VIEW</div>
      </div>

      <!-- Hint -->
      <div id="hint">SPACE — APPROACH THE RING</div>
      <!-- Era HUD (drone mode only) -->
      <div id="era-hud"></div>

      <!-- Tooltips (positioned by JS) -->
      <div class="tooltip" id="tooltip-star">TROY STAR</div>
      <div class="tooltip" id="tooltip-ring">ILION RING</div>
    </div>

    <!-- ── FOOTER ── -->
    <footer id="site-footer">
      <a href="https://neuronomicon.world" id="footer-name">NEURONOMICON</a>
      <div id="footer-stripes" aria-hidden="true">
        <span class="fs black"></span>
        <span class="fs black"></span>
        <span class="fs blue"></span>
        <span class="fs black"></span>
      </div>
    </footer>

    <!-- Import Map for Three.js and Addons -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { Line2 } from "three/addons/lines/Line2.js";
      import { LineMaterial } from "three/addons/lines/LineMaterial.js";
      import { LineGeometry } from "three/addons/lines/LineGeometry.js";
      import { Wireframe } from "three/addons/lines/Wireframe.js";
      import { WireframeGeometry2 } from "three/addons/lines/WireframeGeometry2.js";

      // ─── RENDERER ─────────────────────────────────────────────────────────────────
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x010108);
      document.body.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        44,
        window.innerWidth / window.innerHeight,
        0.1,
        10000,
      );

      // ─── CONSTANTS ────────────────────────────────────────────────────────────────
      const R = 200;
      const RI = R - 14; // 186 — inner face (ground, faces Troy ★)
      const RO = R + 14; // 214 — outer hull (ceiling, faces space)
      const H = 14; // half-height

      // Arc: 215° completed, 145° gap
      const ARC_S = -Math.PI * 0.1;
      const ARC_E = Math.PI * 1.085;
      const ARC_SPAN = ARC_E - ARC_S;

      // ─── ERA SYSTEM ───────────────────────────────────────────────────────────────
      // Fictional history: 2234–2444 (210 years). Arc position encodes fictional time.
      const ERA_MINING_END = ARC_S + ARC_SPAN * (70 / 210);   // Mining → Rush boundary
      const ERA_RUSH_END   = ARC_S + ARC_SPAN * (140 / 210);  // Rush → MAGI boundary

      const ERA_COLORS = { mining: 0x7184a0, rush: 0xff8800, magi: 0x44ddff };
      const ERA_LABELS = {
        mining: { label: 'ERA I  ·  MINING OPERATIONS', color: '#7184a0' },
        rush:   { label: 'ERA II  ·  THORIUM RUSH',     color: '#ff8800' },
        magi:   { label: 'ERA III  ·  MAGI ERA',        color: '#44ddff' },
      };

      function getEra(angle) {
        return angle < ERA_MINING_END ? 'mining' : angle < ERA_RUSH_END ? 'rush' : 'magi';
      }
      function fictYear(angle) {
        return Math.round(2234 + ((angle - ARC_S) / ARC_SPAN) * 210);
      }
      function blendHex(a, b, t) {
        const ar=(a>>16)&0xff, ag=(a>>8)&0xff, ab=a&0xff;
        const br=(b>>16)&0xff, bg=(b>>8)&0xff, bb=b&0xff;
        return (Math.round(ar+(br-ar)*t)<<16)|(Math.round(ag+(bg-ag)*t)<<8)|Math.round(ab+(bb-ab)*t);
      }

      // Colours
      const COL_INNER = 0xff3333;
      const COL_OUTER = 0x4488ff;
      const COL_TOP = 0xffcc00;
      const COL_BOT = 0x44ff88;
      const COL_STRUCT = 0x226644;
      const COL_ARC = 0x00ccbb;
      const COL_GHOST = 0x002018;

      // ─── LOD BLEND ────────────────────────────────────────────────────────────────
      let tDrone = 0;
      const gOrbit = new THREE.Group();
      const gDrone = new THREE.Group();
      scene.add(gOrbit);
      scene.add(gDrone);

      function add(group, obj, baseOp) {
        if (baseOp !== undefined && obj.material) {
          obj.material.opacity = baseOp;
          obj.userData.baseOp = baseOp;
        }
        group.add(obj);
        return obj;
      }

      // ─── HELPERS ──────────────────────────────────────────────────────────────────
      const V3 = (x, y, z) => new THREE.Vector3(x, y, z);

      function hsh(s) {
        let v = 5381;
        for (let i = 0; i < s.length; i++)
          v = (Math.imul(v, 33) ^ s.charCodeAt(i)) >>> 0;
        return v;
      }

      // Store all LineMaterials to update their resolution on resize
      const lineMaterials = [];

      function createLineMaterial(col, op) {
        const mat = new LineMaterial({
          color: col,
          linewidth: 2, // 2 pixels thick
          transparent: true,
          opacity: op,
          resolution: new THREE.Vector2(window.innerWidth, window.innerHeight),
        });
        lineMaterials.push(mat);
        return mat;
      }

      function mkLine(pts, col, op) {
        const geometry = new LineGeometry();
        const positions = [];
        for (let i = 0; i < pts.length; i++) {
          positions.push(pts[i].x, pts[i].y, pts[i].z);
        }
        geometry.setPositions(positions);

        const material = createLineMaterial(col, op);
        const line = new Line2(geometry, material);
        line.computeLineDistances();
        return line;
      }

      function mkArc(r, segs, y, col, op) {
        const pts = [];
        for (let i = 0; i <= segs; i++) {
          const a = ARC_S + (i / segs) * (ARC_E - ARC_S);
          pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
        }
        return mkLine(pts, col, op);
      }

      function mkWire(geo, col, op) {
        const geometry = new WireframeGeometry2(geo);
        const material = createLineMaterial(col, op);
        const wireframe = new Wireframe(geometry, material);
        wireframe.computeLineDistances();
        return wireframe;
      }

      // ─── ALWAYS-ON ────────────────────────────────────────────────────────────────
      // Starfield
      {
        const n = 3800,
          buf = new Float32Array(n * 3);
        for (let i = 0; i < n * 3; i++) buf[i] = (Math.random() - 0.5) * 6000;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(buf, 3));
        scene.add(
          new THREE.Points(
            geo,
            new THREE.PointsMaterial({
              color: 0xffffff,
              size: 0.75,
              transparent: true,
              opacity: 0.5,
            }),
          ),
        );
      }

      // Troy (star at ring center)
      const troyGroup = new THREE.Group();
      {
        troyGroup.add(
          new THREE.Mesh(
            new THREE.SphereGeometry(18, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xfff8ee }),
          ),
        );
        const corona = mkWire(
          new THREE.TorusGeometry(32, 0.4, 8, 40),
          0xffee88,
          0.3,
        );
        corona.rotation.x = Math.PI / 2;
        troyGroup.add(corona);
        troyGroup.add(new THREE.PointLight(0xfff8ee, 1.5, 3000));
        scene.add(troyGroup);
      }

      // Boneyard
      {
        for (let i = 0; i < 70; i++) {
          const s = hsh("bone" + i);
          const a = ((s % 10000) / 10000) * Math.PI * 2;
          const r = R * 1.38 + (s % 110);
          const y = (((s >> 8) & 0xff) / 255 - 0.5) * 80;
          const sz = 0.6 + (s % 20) * 0.16;
          const ast = mkWire(
            new THREE.IcosahedronGeometry(sz, s % 2),
            0x383838,
            0.1 + (s % 12) * 0.012,
          );
          ast.position.set(Math.cos(a) * r, y, Math.sin(a) * r);
          ast.rotation.set(
            (((s >> 4) & 0xff) / 255) * Math.PI * 2,
            (((s >> 12) & 0xff) / 255) * Math.PI * 2,
            (((s >> 20) & 0xff) / 255) * Math.PI * 2,
          );
          ast.userData.spin = {
            x: ((s & 0xf) / 15 - 0.5) * 0.003,
            y: (((s >> 4) & 0xf) / 15 - 0.5) * 0.003,
          };
          scene.add(ast);
        }
      }

      // ═══════════════════════════════════════════════════════════════════════════════
      // ORBITAL GROUP
      // ═══════════════════════════════════════════════════════════════════════════════
      add(gOrbit, mkArc(R, 280, 0, COL_ARC, 0.8), 0.8);

      {
        const GAP = Math.PI * 2 - (ARC_E - ARC_S);
        [0.22, 0.52, 0.8].forEach((frac, i) => {
          const pts = [];
          for (let j = 0; j <= 20; j++) {
            const a = ARC_E + (j / 20) * GAP * frac;
            pts.push(new THREE.Vector3(Math.cos(a) * R, 0, Math.sin(a) * R));
          }
          const op = 0.09 - i * 0.02;
          add(gOrbit, mkLine(pts, COL_GHOST, op), op);
        });
      }

      // ═══════════════════════════════════════════════════════════════════════════════
      // DRONE GROUP: SOLID STRUCTURE
      // ═══════════════════════════════════════════════════════════════════════════════
      
      const arcLen = ARC_E - ARC_S;
      const solidMat = new THREE.MeshStandardMaterial({ 
        color: 0x111111, 
        roughness: 0.8, 
        metalness: 0.2,
        transparent: true
      });

      // 1. Inner Ground Plane (The floor where buildings sit)
      // A cylinder segment mapped to the inside of RI
      const groundGeo = new THREE.CylinderGeometry(RI, RI, H * 2, 64, 1, true, ARC_S, arcLen);
      const groundMesh = new THREE.Mesh(groundGeo, solidMat);
      groundMesh.material.side = THREE.BackSide; // Render on the inside
      add(gDrone, groundMesh, 1.0);

      // 2. Outer Ceiling (The sky/back wall)
      const ceilMat = new THREE.MeshStandardMaterial({ 
        color: 0x333333, 
        roughness: 0.9, 
        metalness: 0.1,
        transparent: true
      });
      const ceilGeo = new THREE.CylinderGeometry(RO, RO, H * 2, 64, 1, true, ARC_S, arcLen);
      const ceilMesh = new THREE.Mesh(ceilGeo, ceilMat);
      ceilMesh.material.side = THREE.FrontSide; // Viewed from inside
      add(gDrone, ceilMesh, 1.0);

      // 3. Side Walls (Connecting Ground to Ceiling)
      // Top Side
      const topWallGeo = new THREE.RingGeometry(RI, RO, 64, 1, ARC_S, arcLen);
      const topWallMesh = new THREE.Mesh(topWallGeo, solidMat);
      topWallMesh.rotation.x = Math.PI / 2;
      topWallMesh.position.y = H;
      add(gDrone, topWallMesh, 1.0);

      // Bottom Side
      const botWallGeo = new THREE.RingGeometry(RI, RO, 64, 1, ARC_S, arcLen);
      const botWallMesh = new THREE.Mesh(botWallGeo, solidMat);
      botWallMesh.rotation.x = -Math.PI / 2;
      botWallMesh.position.y = -H;
      add(gDrone, botWallMesh, 1.0);

      // 4. End Caps
      const endCapGeo = new THREE.PlaneGeometry(RO - RI, H * 2);
      
      const capStart = new THREE.Mesh(endCapGeo, solidMat);
      capStart.position.set(Math.cos(ARC_S) * (RI + (RO - RI)/2), 0, Math.sin(ARC_S) * (RI + (RO - RI)/2));
      capStart.rotation.y = -ARC_S + Math.PI / 2;
      add(gDrone, capStart, 1.0);

      const capEnd = new THREE.Mesh(endCapGeo, solidMat);
      capEnd.position.set(Math.cos(ARC_E) * (RI + (RO - RI)/2), 0, Math.sin(ARC_E) * (RI + (RO - RI)/2));
      capEnd.rotation.y = -ARC_E - Math.PI / 2;
      add(gDrone, capEnd, 1.0);

      // ─── CITY — GITHUB REPOS AS BUILDINGS ON INNER RED SURFACE ──────────────────

      gDrone.add(gCity);

      const gGates = new THREE.Group();
      gDrone.add(gGates);

      function placeEraGate(angle, col) {
        // Tall thin pillar spanning full ring cross-section (30 units = ±15, beyond ±H=14)
        const m = mkWire(new THREE.BoxGeometry(0.3, 30, 0.4), col, 0.9);
        m.rotation.y = -angle;
        m.position.set(Math.cos(angle) * RI, 0, Math.sin(angle) * RI);

      placeEraGate(ERA_MINING_END, ERA_COLORS.rush);  // cold → hot threshold
      placeEraGate(ERA_RUSH_END,   ERA_COLORS.magi);  // hot → ordered threshold

      const LANG_COLORS = {
        JavaScript: 0xf1e05a,
        TypeScript: 0x3178c6,
        HTML: 0xe34c26,
        CSS: 0x563d7c,
        Python: 0x3572a5,
        "C++": 0xf34b7d,

      let frameId;

      let mockUsers = [];

      // Shader Constants
      const ATLAS_SIZE = 2048;
      const ATLAS_CELL = 8;
      const ATLAS_COLS = ATLAS_SIZE / ATLAS_CELL;
      const ATLAS_BAND_ROWS = 42;
      const ATLAS_LIT_PCTS = [0.2, 0.35, 0.5, 0.65, 0.8, 0.95];

      let windowAtlasTexture = null;

      function colorToABGR(hex) {
        const c = new THREE.Color(hex);
        return (
          255 << 24 |
          (Math.round(c.b * 255) << 16) |
          (Math.round(c.g * 255) << 8) |
          Math.round(c.r * 255)
        );
      }

      function createWindowAtlas() {
        const WS = 6;
        const canvas = document.createElement("canvas");
        canvas.width = ATLAS_SIZE;
        canvas.height = ATLAS_SIZE;
        const ctx = canvas.getContext("2d");

        const imageData = ctx.createImageData(ATLAS_SIZE, ATLAS_SIZE);
        const buf32 = new Uint32Array(imageData.data.buffer);

        const faceABGR = colorToABGR("#151b2b");
        const litABGRs = ["#f2795c", "#70b2db", "#c9d1d9"].map(colorToABGR);
        const offABGR = colorToABGR("#0d121c");

        buf32.fill(faceABGR);

        let s = 42;
        const rand = () => {
          s = (s * 16807) % 2147483647;
          return (s - 1) / 2147483646;
        };

        for (let band = 0; band < ATLAS_LIT_PCTS.length; band++) {
          const litPct = ATLAS_LIT_PCTS[band];
          const bandStart = band * ATLAS_BAND_ROWS;
          for (let r = 0; r < ATLAS_BAND_ROWS; r++) {
            const rowY = (bandStart + r) * ATLAS_CELL;
            for (let c = 0; c < ATLAS_COLS; c++) {
              const px = c * ATLAS_CELL;
              const abgr = rand() < litPct
                ? litABGRs[Math.floor(rand() * litABGRs.length)]
                : offABGR;
              for (let dy = 0; dy < WS; dy++) {
                const rowOffset = (rowY + dy) * ATLAS_SIZE + px;
                for (let dx = 0; dx < WS; dx++) {
                  buf32[rowOffset + dx] = abgr;
                }
              }
            }
          }
        }

        ctx.putImageData(imageData, 0, 0);

        const tex = new THREE.CanvasTexture(canvas);
        tex.flipY = false;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.colorSpace = THREE.SRGBColorSpace;
        
        return tex;
      }

      function clearCity() {
        if (cityInstancedMesh) {
          gCity.remove(cityInstancedMesh);
          cityInstancedMesh.geometry.dispose();
          cityInstancedMesh.material.dispose();
          cityInstancedMesh = null;
        }
      }

      async function buildCity(username) {
        setCityStatus("> LOADING ...");
        clearCity();
        try {
          let user = {};
          try {
            // Register (or re-sync) user in the ring DB
            const regRes = await fetch("/api/ring/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username }),
            });
            if (!regRes.ok) {
              const err = await regRes.json().catch(() => ({}));
              throw new Error(err.error || `ERROR ${regRes.status}`);
            }
            user = await regRes.json();
          } catch (e) {
            console.warn("[Ilion] Register API failed, falling back to dummy user.", e);
            user = { ring_angle: ARC_S + (ARC_E - ARC_S) / 2 };
          }

          let users = [];
          try {
            // Load all registered colonists in the full arc
            const usersRes = await fetch(
              `/api/ring/users?from=${ARC_S}&to=${ARC_E}&limit=10000`,
            );
            if (!usersRes.ok) throw new Error("Failed to load ring data");
            users = await usersRes.json();
            if (!Array.isArray(users) || !users.length)
              throw new Error("NO DATA");
          } catch (apiError) {
            console.warn("[Ilion] API failed, using 10,000 mock users for testing InstancedMesh.", apiError);
            users = [];
            for (let i = 0; i < 10000; i++) {
              users.push({
                username: "colonist_" + i,
                ring_angle: ARC_S + Math.random() * (ARC_E - ARC_S),
                star_count: Math.random() > 0.8 ? Math.floor(Math.random() * 50) : 0,
                repo_count: Math.floor(Math.random() * 100),
                top_language: Object.keys(LANG_COLORS)[Math.floor(Math.random() * Object.keys(LANG_COLORS).length)]
              });
            }
          }

          // Calculate total instances needed (1 base + 2 if stars > 0)
          let totalInstances = 0;
          for (let i = 0; i < users.length; i++) {
            totalInstances += (users[i].star_count > 0 ? 3 : 1);
          }

          if (!windowAtlasTexture) {
            windowAtlasTexture = createWindowAtlas();
          }

          // Initialize InstancedMesh
          const geometry = new THREE.BoxGeometry(1, 1, 1);
          geometry.computeVertexNormals();

          // We need custom attributes for UV mapping the CanvasAtlas
          const uvFrontData = new Float32Array(totalInstances * 4);
          const uvSideData = new Float32Array(totalInstances * 4);
          const tintData = new Float32Array(totalInstances * 4);
          const liveData = new Float32Array(totalInstances);

          geometry.setAttribute("aUvFront", new THREE.InstancedBufferAttribute(uvFrontData, 4));
          geometry.setAttribute("aUvSide", new THREE.InstancedBufferAttribute(uvSideData, 4));
          geometry.setAttribute("aTint", new THREE.InstancedBufferAttribute(tintData, 4));
          geometry.setAttribute("aLive", new THREE.InstancedBufferAttribute(liveData, 1));

          const vertexShader = `
            attribute vec4 aUvFront;
            attribute vec4 aUvSide;
            attribute vec4 aTint;
            attribute float aLive;

            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec4 vUvFront;
            varying vec4 vUvSide;
            varying vec4 vTint;
            varying float vLive;
            varying vec3 vViewPos;

            void main() {
              vUv = uv;
              vNormal = normalize(mat3(instanceMatrix) * normal);
              vUvFront = aUvFront;
              vUvSide = aUvSide;
              vTint = aTint;
              vLive = aLive;

              vec4 mvPos = modelViewMatrix * instanceMatrix * vec4(position, 1.0);
              vViewPos = mvPos.xyz;
              gl_Position = projectionMatrix * mvPos;
            }
          `;

          const fragmentShader = `
            uniform sampler2D uAtlas;
            uniform vec3 uFaceColor;
            uniform float uOpacity;

            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec4 vUvFront;
            varying vec4 vUvSide;
            varying vec4 vTint;
            varying float vLive;
            varying vec3 vViewPos;

            void main() {
              float fogDepth = length(vViewPos);
              if (fogDepth > 3500.0) discard;

              vec3 absN = abs(vNormal);
              float isRoof = step(0.5, absN.y);

              // Choose side face if normal points mostly along X, front/back if along Z
              bool isFrontBack = absN.z > absN.x;
              vec4 uvParams = isFrontBack ? vUvFront : vUvSide;

              vec2 atlasUv = uvParams.xy + vUv * uvParams.zw;
              vec3 wallColor = texture2D(uAtlas, atlasUv).rgb;

              // Color Tint matching git-city logic
              if (vTint.a > 0.5) {
                float isFacePixel = step(length(wallColor - uFaceColor), 0.08); // is background wall
                vec3 blendedTint = mix(uFaceColor, vTint.rgb, 0.5); // Blend base with unique color
                wallColor = mix(wallColor, blendedTint, isFacePixel); // Only tint walls, keep windows bright
              }

              // Glow calculation (simulating ambient + emissive windows)
              float ambientBase = 0.25;
              vec3 emissive = wallColor * 1.8;
              vec3 wallFinal = wallColor * ambientBase + emissive;
              
              // Boost live modules
              vec3 liveBoost = vec3(1.4, 1.35, 1.2);
              wallFinal = mix(wallFinal, wallFinal * liveBoost, vLive);

              // Solid brighter roof
              vec3 roofFinal = vTint.rgb * 1.5;
              vec3 color = mix(wallFinal, roofFinal, isRoof);

              // Simple directional lighting
              vec3 lightDir = normalize(vec3(0.3, 1.0, 0.5));
              float diffuse = max(dot(vNormal, lightDir), 0.0) * 0.3 + 0.7;
              color *= diffuse;

              // Distance fog
              float fogFactor = smoothstep(500.0, 3500.0, fogDepth);
              color = mix(color, vec3(0.04, 0.08, 0.16), fogFactor);

              gl_FragColor = vec4(color, uOpacity);
            }
          `;

          const material = new THREE.ShaderMaterial({ 
            uniforms: {
              uAtlas: { value: windowAtlasTexture },
              uFaceColor: { value: new THREE.Color("#151b2b") },
              uOpacity: { value: 1.0 }
            },
            vertexShader,
            fragmentShader,
            transparent: true,
            depthWrite: true,
          });

          cityInstancedMesh = new THREE.InstancedMesh(geometry, material, totalInstances);
          // Required for dynamic coloring in older Three.js versions but recommended for new ones too
          cityInstancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
          
          // Apply individual alpha per instance via custom attribute or relying on base opacity + color
          // We will tint colors slightly to approximate the original styling.
          
          const dummy = new THREE.Object3D();
          const colorObj = new THREE.Color();
          
          let instanceIdx = 0;

          users.forEach((u) => {
            const angle = (u.arc_start != null && u.arc_end != null)
              ? (u.arc_start + u.arc_end) / 2
              : u.ring_angle;
            const stars = u.star_count || 0;
            const repos = u.repo_count || 1;
            const langCol = LANG_COLORS[u.top_language] || 0xff5555;
            const col = blendHex(ERA_COLORS[getEra(angle)], langCol, 0.35);
            
            const radial = 1.5 + Math.min(stars * 0.05, 3.5);
            const height = 3.5 + Math.min(repos / 10, 5);
            
            colorObj.setHex(col);

            // Base building
            dummy.scale.set(radial, height, 1.2);
            dummy.position.set(
              Math.cos(angle) * (RI - radial / 2),
              0,
              Math.sin(angle) * (RI - radial / 2)
            );
            dummy.rotation.set(0, -angle, 0);
            dummy.updateMatrix();
            cityInstancedMesh.setMatrixAt(instanceIdx, dummy.matrix);
            cityInstancedMesh.setColorAt(instanceIdx, colorObj);

            // Populate UV and Tint Attributes based on Git City logic
            const seedFront = instanceIdx * 3 + 1;
            const seedSide = instanceIdx * 7 + 2;

            const assignUv = (arr, offset, seed) => {
              const r = ((seed * 9301 + 49297) % 233280) / 233280;
              const band = Math.floor(r * ATLAS_LIT_PCTS.length);
              const row = band * ATLAS_BAND_ROWS + (seed % ATLAS_BAND_ROWS);
              const col = seed % ATLAS_COLS;
              arr.set([
                (col * ATLAS_CELL) / ATLAS_SIZE,
                1.0 - ((row + 1) * ATLAS_CELL) / ATLAS_SIZE,
                ATLAS_CELL / ATLAS_SIZE,
                ATLAS_CELL / ATLAS_SIZE
              ], offset);
            };

            assignUv(uvFrontData, instanceIdx * 4, seedFront);
            assignUv(uvSideData, instanceIdx * 4, seedSide);
            
            tintData.set([colorObj.r, colorObj.g, colorObj.b, 1.0], instanceIdx * 4);
            liveData[instanceIdx] = (Math.random() > 0.9) ? 1.0 : 0.0;

            instanceIdx++;

            // Star wings
            if (stars > 0) {
              const wingRadial = radial * 0.55;
              const wingHeight = height * 0.45;
              const wingWidth = 1.0;
              
              // Bottom wing (-7)
              dummy.scale.set(wingRadial, wingHeight, wingWidth);
              dummy.position.set(
                Math.cos(angle) * (RI - wingRadial / 2),
                -7,
                Math.sin(angle) * (RI - wingRadial / 2)
              );
              dummy.rotation.set(0, -angle, 0);
              dummy.updateMatrix();
              cityInstancedMesh.setMatrixAt(instanceIdx, dummy.matrix);
              
              // Slightly darker/faded for wings logic:
              colorObj.setHex(col).lerp(new THREE.Color(0x000000), 0.3);
              cityInstancedMesh.setColorAt(instanceIdx, colorObj);
              
              assignUv(uvFrontData, instanceIdx * 4, seedFront + 100);
              assignUv(uvSideData, instanceIdx * 4, seedSide + 100);
              tintData.set([colorObj.r, colorObj.g, colorObj.b, 1.0], instanceIdx * 4);
              liveData[instanceIdx] = 0.0;
              
              instanceIdx++;

              // Top wing (+7)
              dummy.position.y = 7;
              dummy.updateMatrix();
              cityInstancedMesh.setMatrixAt(instanceIdx, dummy.matrix);
              cityInstancedMesh.setColorAt(instanceIdx, colorObj);
              
              assignUv(uvFrontData, instanceIdx * 4, seedFront + 200);
              assignUv(uvSideData, instanceIdx * 4, seedSide + 200);
              tintData.set([colorObj.r, colorObj.g, colorObj.b, 1.0], instanceIdx * 4);
              liveData[instanceIdx] = 0.0;
              
              instanceIdx++;
            }
          });

          cityInstancedMesh.instanceMatrix.needsUpdate = true;
          // if (cityInstancedMesh.instanceColor) cityInstancedMesh.instanceColor.needsUpdate = true;
          
          gCity.add(cityInstancedMesh);
          
          // Add this custom userData opacity logic so the "blendGroups" function (tDrone lerp) 
          // can smoothly fade the instanced mesh geometry in and out
          add(gCity, cityInstancedMesh, 0.6);

          setCityStatus(`> ${users.length} COLONISTS`);

          // Fly camera to this user's permanent slot
          if (user && typeof user.ring_angle === "number") {
            droneAngle = user.ring_angle;
            droneDir = 1;
          }
        } catch (e) {
          console.warn("[Ilion] City build failed:", e);
          setCityStatus(`> ${e.message}`);
        }
      }

      const ghUserInput = document.getElementById("gh-user");

      buildCity("eknobl");

      // ─── CAMERA SYSTEM ────────────────────────────────────────────────────────────

      let mode = "orbital";
      let droneAngle = ARC_S;
      let droneDir = 1; // +1 = forward toward ARC_E, -1 = reverse toward ARC_S

      const ORBITAL_POS = new THREE.Vector3(0, 265, 420);
      const ORBITAL_TGT = new THREE.Vector3(0, 0, 0);
      const ORBITAL_FOV = 44;

      const camPos = ORBITAL_POS.clone();
      const camTgt = ORBITAL_TGT.clone();

      const DRONE_POS_R = RI - 5;
      const DRONE_TGT_R = RI - 20;
      const DRONE_LOOKAHEAD = 0.32;
      const DRONE_FOV = 72;
      const DRONE_ADVANCE = 0.0015;

      function getGoalPos() {
        return mode === "orbital" || mode === "flyOut"
          ? ORBITAL_POS
          : dronePos;
      }

      // Preallocate for animate loop
      const _fwd = new THREE.Vector3();
      const _idealLook = new THREE.Vector3();

      function getGoalTgt() {
        if (mode === "orbital" || mode === "flyOut") return ORBITAL_TGT;
        // In Drone mode, look slightly ahead of the current dronePos
        _fwd.set(-Math.sin(yaw), Math.sin(pitch), -Math.cos(yaw)).normalize();
        _idealLook.copy(dronePos).addScaledVector(_fwd, 50);
        return _idealLook;
      }
      function getGoalFov() {
        return mode === "orbital" || mode === "flyOut"
          ? ORBITAL_FOV
          : DRONE_FOV;
      }

      // ─── INTERACTION ──────────────────────────────────────────────────────────────
      const hintEl = document.getElementById("hint");

      // ─── FREE-FLIGHT MECHANICS ───────────────────────────────────────────────────
      let yaw = Math.PI / 2; // Face ring center initially
      let pitch = 0;
      let bank = 0;
      let flySpeed = 27.5;
      const dronePos = new THREE.Vector3(0, 120, R - 200); // Start near the ring

      function deadzoneCurve(v) {
        const abs = Math.abs(v);
        if (abs < DEADZONE) return 0;
        const adjusted = (abs - DEADZONE) / (1 - DEADZONE);
        return Math.sign(v) * adjusted * adjusted;
      }

      window.addEventListener("keydown", (e) => {

             );

      // ─── UNITS TOGGLE ─────────────────────────────────────────────────────────────
      const DIMS = {

      });

      // ─── TOOLTIP POSITIONING ──────────────────────────────────────────────────────
      const tooltipStar = document.getElementById("tooltip-star");
      const tooltipRing = document.getElementById("tooltip-ring");
      const BANNER_H = 46; // px — offset for #ui starting below banner

      // Point on ring arc — use the lowest visible point (near bottom of screen in orbital view)
      const RING_TOOLTIP_ANGLE = (ARC_S + ARC_E) / 2 + 0.4;



      const eraHudEl = document.getElementById("era-hud");

      function projectToScreen(worldX, worldY, worldZ) {
        const vec = new THREE.Vector3(worldX, worldY, worldZ);
        vec.project(camera);
        return {
          // vec.z < 1 ensures it's in front of camera
          visible: vec.z < 1 && vec.z > -1,
          x: (vec.x * 0.5 + 0.5) * window.innerWidth,
          y: (vec.y * -0.5 + 0.5) * window.innerHeight,
        };
      }

      function updateTooltips() {
        // Only show in orbital mode, fade with tDrone
        const alpha = Math.max(0, 1 - tDrone * 4);

        if (alpha < 0.01) {
          tooltipStar.style.opacity = "0";
          tooltipRing.style.opacity = "0";
          return;
        }

        // Project Troy star (world origin) → screen
        const { x: tx, y: ty } = projectToScreen(0, 0, 0);
        tooltipStar.style.left = tx - tooltipStar.offsetWidth / 2 + "px";
        tooltipStar.style.top  = ty - BANNER_H - tooltipStar.offsetHeight - 16 + "px";
        tooltipStar.style.opacity = alpha;

        // Project a point on the ring arc
        const pRing = projectToScreen(Math.cos(RING_TOOLTIP_ANGLE) * R, 0, Math.sin(RING_TOOLTIP_ANGLE) * R);
        if (pRing.visible) {
          tooltipRing.style.left = pRing.x - tooltipRing.offsetWidth / 2 + "px";
          tooltipRing.style.top  = pRing.y - BANNER_H - tooltipRing.offsetHeight - 16 + "px";
          tooltipRing.style.opacity = alpha;
        } else {
          tooltipRing.style.opacity = "0";
        }


      }

      // ─── ANIMATION ────────────────────────────────────────────────────────────────
      let tick = 0;
      const UP_ORB = new THREE.Vector3(0, 1, 0);
      const camUpDrone = new THREE.Vector3();

      function blendGroups() {
        const target = mode === "drone" || mode === "flyIn" ? 1 : 0;
        tDrone += (target - tDrone) * 0.028;
        const tO = Math.max(0, 1 - tDrone * 2);
        const tD = Math.max(0, tDrone * 2 - 1);
        gOrbit.traverse((o) => {
          if (o.material && o.userData.baseOp !== undefined)
            o.material.opacity = o.userData.baseOp * tO;
        });
        gDrone.traverse((o) => {
          if (o.material && o.userData.baseOp !== undefined) {
            o.material.opacity = o.userData.baseOp * tD;
            if (o.material.uniforms && o.material.uniforms.uOpacity) {
              o.material.uniforms.uOpacity.value = Math.min(1.0, tD * 1.5); // Fade in slightly faster
            }
          }
        });
      }

      // ─── PLAYER AVATAR: STARSHIP ───────────────────────────────────────────────────
      const starship = new THREE.Group();
      
      const hullMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.6, roughness: 0.4 });
      const wingMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.7, roughness: 0.4 });
      const thrustMat = new THREE.MeshBasicMaterial({ color: 0x00ffff }); // Glowing cyan propulsors

      // Main Fuselage (sleek cylinder pointing "forward" down Z axis)
      const hullGeo = new THREE.CylinderGeometry(0.5, 2, 12, 8);
      hullGeo.rotateX(Math.PI / 2);
      const hull = new THREE.Mesh(hullGeo, hullMat);
      starship.add(hull);

      // Cockpit
      const cockpitGeo = new THREE.BoxGeometry(1.5, 1, 4);
      const cockpit = new THREE.Mesh(cockpitGeo, new THREE.MeshStandardMaterial({ color: 0x444444 }));
      cockpit.position.set(0, 1.2, 2);
      starship.add(cockpit);

      // Wings (swept back)
      const leftWingGeo = new THREE.BoxGeometry(6, 0.4, 4);
      leftWingGeo.translate(3, 0, -1); // sweep back translation
      leftWingGeo.rotateY(-0.3);       // sweep back rotation
      const leftWing = new THREE.Mesh(leftWingGeo, wingMat);
      leftWing.position.set(1.5, 0, -2);
      starship.add(leftWing);

      const rightWingGeo = new THREE.BoxGeometry(6, 0.4, 4);
      rightWingGeo.translate(-3, 0, -1);
      rightWingGeo.rotateY(0.3);
      const rightWing = new THREE.Mesh(rightWingGeo, wingMat);
      rightWing.position.set(-1.5, 0, -2);
      starship.add(rightWing);

      // Wing Propulsors (Thrusters)
      const thrustGeo = new THREE.CylinderGeometry(0.6, 0.8, 3, 8);
      thrustGeo.rotateX(Math.PI / 2);
      
      const leftEngine = new THREE.Mesh(thrustGeo, hullMat);
      leftEngine.position.set(6, 0, -2);
      const leftGlow = new THREE.Mesh(new THREE.CircleGeometry(0.5, 8), thrustMat);
      leftGlow.position.set(0, 0, -1.51);
      leftGlow.rotateY(Math.PI);
      leftEngine.add(leftGlow);
      starship.add(leftEngine);

      const rightEngine = new THREE.Mesh(thrustGeo, hullMat);
      rightEngine.position.set(-6, 0, -2);
      const rightGlow = new THREE.Mesh(new THREE.CircleGeometry(0.5, 8), thrustMat);
      rightGlow.position.set(0, 0, -1.51);
      rightGlow.rotateY(Math.PI);
      rightEngine.add(rightGlow);
      starship.add(rightEngine);

      // Optional: Engine trail light
      const engineLight = new THREE.PointLight(0x00ffff, 2, 50);
      engineLight.position.set(0, 0, -8);
      starship.add(engineLight);

      starship.scale.set(0.5, 0.5, 0.5);

      gDrone.add(starship);

      function animate() {
        requestAnimationFrame(animate);
        tick += 0.001;

        const inTransit = mode === "flyIn" || mode === "flyOut";
        const isDrone = mode === "drone";

        // Free-flight logic updates dronePos and angles
        if (isDrone) {
          const dt = 0.016; // Approx fixed timestep for smooth flight
          let turnInput = deadzoneCurve(mouse.x);
          if (keys["KeyA"] || keys["ArrowLeft"]) turnInput = -1;
          if (keys["KeyD"] || keys["ArrowRight"]) turnInput = 1;
          yaw -= turnInput * 2.0 * dt;

          let altInput = deadzoneCurve(mouse.y);
          if (keys["KeyW"] || keys["ArrowUp"]) altInput = 1;
          if (keys["KeyS"] || keys["ArrowDown"]) altInput = -1;

          let speedMult = 1;
          if (keys["ShiftLeft"] || keys["ShiftRight"]) speedMult = 2;
          if (keys["AltLeft"] || keys["AltRight"]) speedMult = 0.3;

          const actualSpeed = flySpeed * speedMult;
          dronePos.y += altInput * 55 * Math.sqrt(actualSpeed / DEFAULT_FLY_SPEED) * dt;
          
          // Altitude boundaries
          dronePos.y = Math.max(20, Math.min(2000, dronePos.y));

          _fwd.set(-Math.sin(yaw), 0, -Math.cos(yaw));
          dronePos.addScaledVector(_fwd, actualSpeed * dt);

          // Radial boundaries (Keep near the ring)
          const distSq = dronePos.x * dronePos.x + dronePos.z * dronePos.z;
          const dist = Math.sqrt(distSq);
          const MIN_R = R - 1500;
          const MAX_R = R + 100;

          if (dist < MIN_R) {
            dronePos.x = (dronePos.x / dist) * MIN_R;
            dronePos.z = (dronePos.z / dist) * MIN_R;
          } else if (dist > MAX_R) {
            dronePos.x = (dronePos.x / dist) * MAX_R;
            dronePos.z = (dronePos.z / dist) * MAX_R;
          }

          const targetBank = -turnInput * 0.55;
          bank += (targetBank - bank) * 5 * dt;

          const targetPitch = altInput * 0.7;
          pitch += (targetPitch - pitch) * 6 * dt;

          // Instead of updating droneAngle purely for rendering, we derive it from dronePos
          // so the era lighting and spatial UI components still know where we are around the ring.
          droneAngle = Math.atan2(dronePos.z, dronePos.x);
          if (droneAngle < 0) droneAngle += Math.PI * 2;

          // Update Starship transform
          starship.position.copy(dronePos);
          starship.rotation.set(pitch, yaw + Math.PI, bank, "YXZ");
          starship.visible = true;
        } else {
          starship.visible = false;
        }

        const speed = inTransit ? 0.024 : isDrone ? 0.08 : 0.06;

        camPos.lerp(getGoalPos(), speed);
        camTgt.lerp(getGoalTgt(), speed);
        camera.fov += (getGoalFov() - camera.fov) * 0.04;

        camUpDrone.set(0, 1, 0); // Use absolute UP to keep camera oriented properly in free-flight, instead of banking sideways
        camera.up.lerpVectors(UP_ORB, camUpDrone, tDrone).normalize();
        camera.updateProjectionMatrix();
        camera.position.copy(camPos);
        camera.lookAt(camTgt);

        if (mode === "flyIn" && camPos.distanceTo(getGoalPos()) < 5)
          setMode("drone");
        if (mode === "flyOut" && camPos.distanceTo(getGoalPos()) < 5)
          setMode("orbital");

        if (mode === "orbital") {
          ORBITAL_POS.x = Math.sin(tick * 0.12) * 80;
          ORBITAL_POS.z = 420 + Math.sin(tick * 0.08) * 30;
        }

        troyGroup.scale.setScalar(mode === "orbital" || mode === "flyOut" ? 0.1 : 1.0);

        blendGroups();
        updateTooltips();

        // ── Drone HUD: era name + fictional year ────────────────────────────
        if (mode === "drone" || tDrone > 0.01) {
          const era = getEra(droneAngle);
          const yr  = fictYear(droneAngle);
          eraHudEl.textContent  = `${ERA_LABELS[era].label}  ·  ${yr}`;
          eraHudEl.style.color  = ERA_LABELS[era].color;
          eraHudEl.style.opacity = Math.min(1, tDrone * 4);
        } else {
          eraHudEl.style.opacity = "0";
        }

        scene.children.forEach((obj) => {
          if (obj.userData.spin) {
            obj.rotation.x += obj.userData.spin.x;
            obj.rotation.y += obj.userData.spin.y;
          }
        });

        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Update resolution uniform for all LineMaterials to maintain correct thickness
        lineMaterials.forEach(mat => {
          mat.resolution.set(window.innerWidth, window.innerHeight);
        });
      });
    </script>
  </body>
</html>
